<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motor Parts Garage</title>

<link rel="stylesheet" href="style.css">

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
scroll-behavior:smooth;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
z-index:-2;
}

.loader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
z-index:9999;
animation:hide 3s forwards;
}

@keyframes hide{
90%{opacity:1;}
100%{
opacity:0;
visibility:hidden;
}
}

header{

position:fixed;
top:0;
left:0;
width:100%;
padding:20px 80px;

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(0,0,0,.5);
backdrop-filter:blur(15px);

z-index:999;

}

.logo{

font-size:32px;
font-weight:bold;
color:red;

}

nav a{

color:white;
text-decoration:none;
margin-left:30px;
transition:.3s;

}

nav a:hover{

color:red;

}

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:30px;

}

.hero h1{

font-size:65px;

text-shadow:0 0 20px red;

}

.hero p{

margin:20px auto;

max-width:700px;

}

.btn{

display:inline-block;

padding:15px 40px;

background:red;

color:white;

text-decoration:none;

border-radius:40px;

transition:.3s;

}

.btn:hover{

background:white;

color:black;

transform:scale(1.1);

}

.slider{

position:relative;

height:100vh;

overflow:hidden;

}

.slide{

position:absolute;

width:100%;

height:100%;

opacity:0;

transition:1s;

}

.slide img{

width:100%;

height:100%;

object-fit:cover;

}

.slide.active{

opacity:1;

}

.arrow{

position:absolute;

top:50%;

transform:translateY(-50%);

font-size:50px;

color:white;

padding:20px;

cursor:pointer;

z-index:5;

}

.left{

left:20px;

}

.right{

right:20px;

}

.music{

position:fixed;

bottom:20px;

left:20px;

background:red;

width:60px;

height:60px;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

cursor:pointer;

z-index:999;

}

.whatsapp{

position:fixed;

bottom:20px;

right:20px;

background:#25D366;

width:70px;

height:70px;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

font-size:35px;

color:white;

text-decoration:none;

z-index:999;

}

</style>

</head>

<body>

</div>

<source src="video.mp4" type="video/mp4">

</video>

<div class="overlay"></div>

</nav>

<div>

</h1>

<p data-aos="fade-up">

Pusat Part Racing Terlengkap dan Termurah

</p>

BELANJA SEKARANG

</a>

</div>
