<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motor Parts Garage</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
cursor:none;
}

body{
background:linear-gradient(135deg,#111,#990000,#000);
height:100vh;
overflow:hidden;
color:white;
}

.cursor{
width:18px;
height:18px;
border:2px solid cyan;
border-radius:50%;
position:fixed;
pointer-events:none;
box-shadow:0 0 20px cyan;
transform:translate(-50%,-50%);
z-index:9999;
}

header{
padding:20px;
text-align:center;
font-size:35px;
font-weight:bold;
color:#ff3b3b;
text-shadow:0 0 20px red;
}

marquee{
background:#ff0000;
padding:12px;
font-weight:bold;
font-size:18px;
}

.hero{
height:70vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h1{
font-size:55px;
text-shadow:0 0 25px red;
}

.hero p{
margin:20px;
font-size:20px;
max-width:700px;
}

button,a{
padding:15px 35px;
background:red;
color:white;
border:none;
border-radius:40px;
font-size:18px;
text-decoration:none;
margin:10px;
cursor:pointer;
transition:.3s;
}

button:hover,a:hover{
background:white;
color:black;
transform:scale(1.1);
}

.music{
position:fixed;
bottom:20px;
left:20px;
}

.next{
position:fixed;
bottom:20px;
right:20px;
}
</style>

</head>

<body>

<div class="cursor"></div>

<header>
🏍 MOTOR PARTS GARAGE
</header>

<marquee scrollamount="8">
🔥 Selamat Datang di Motor Parts Garage • Knalpot Racing • Velg • Shock • Oli • Helm • Ban • Aksesoris Motor 🔥
</marquee>

<div class="hero">

<h1>PART MOTOR TERLENGKAP</h1>

<p>
Menjual berbagai part motor original dan racing dengan harga terbaik.
</p>

</div>

<div class="music">
<button onclick="musik()">
🎵 ON / OFF
</button>
</div>

<div class="next">
<a href="halaman2.html">
NEXT →
</a>
</div>

<audio id="lagu" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

let audio=document.getElementById("lagu");

function musik(){

if(audio.paused){
audio.play();
}else{
audio.pause();
}

}

let cursor=document.querySelector(".cursor");

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

</script>

</body>
</html>
